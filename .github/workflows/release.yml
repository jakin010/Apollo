name: Release

# Triggers on any tag matching v* (e.g. v0.1.0, v1.2.3-rc1).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release and upload assets

env:
  CARGO_TERM_COLOR: always
  PROTOC_VERSION: "35.1"
  # Extra files (besides the binary) bundled into every release tarball.
  EXTRA_FILES: "config.example.toml taxonomy.example.toml README.md LICENSE"

jobs:
  # ---------------------------------------------------------------------
  # macOS — Apple Silicon. Metal is compiled in automatically for macOS
  # targets (see crates/inference/Cargo.toml's target-cfg), no feature
  # flag needed.
  # ---------------------------------------------------------------------
  build-macos-arm64:
    name: macOS (arm64)
    runs-on: macos-latest # currently macOS 15, Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-osx-aarch_64.zip"; \
          unzip -o "protoc-${PROTOC_VERSION}-osx-aarch_64.zip" -d "$HOME/.local"; \
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"; \

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --locked -p apollo --target aarch64-apple-darwin

      - name: Package
        run: |
          bash .github/scripts/package.sh aarch64-apple-darwin "${{ github.ref_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: apollo-aarch64-apple-darwin
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------
  # macOS — Intel. macos-13 was retired in Dec 2025; macos-15-intel is the
  # current label for x86_64 hardware.
  # ---------------------------------------------------------------------
  build-macos-intel:
    name: macOS (x86_64)
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-osx-x86_64.zip"; \
          unzip -o "protoc-${PROTOC_VERSION}-osx-x86_64.zip" -d "$HOME/.local"; \
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"; \

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-apple-darwin

      - name: Build
        run: cargo build --release --locked -p apollo --target x86_64-apple-darwin

      - name: Package
        run: |
          bash .github/scripts/package.sh x86_64-apple-darwin "${{ github.ref_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: apollo-x86_64-apple-darwin
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------
  # Linux — CPU only. The portable fallback: no CUDA feature, so nothing
  # links against the CUDA runtime and the binary starts on ANY Linux
  # x86_64 host (GPU or not). This is what to run when CUDA is unavailable
  # — the CUDA build below hard-links the CUDA libraries and will not even
  # start without them.
  # ---------------------------------------------------------------------
  build-linux-cpu:
    name: Linux x86_64 (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          sudo apt-get update; \
          sudo apt-get install -y unzip curl; \
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"; \
          unzip -o "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d "$HOME/.local"; \
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu-cpu

      - name: Build
        run: cargo build --release --locked -p apollo

      - name: Package
        run: |
          bash .github/scripts/package.sh x86_64-unknown-linux-gnu "${{ github.ref_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: apollo-x86_64-unknown-linux-gnu
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------
  # Linux — CUDA. GitHub-hosted runners have no GPU, so we build inside
  # NVIDIA's official CUDA *devel* image: it ships nvcc, the full set of
  # CUDA libraries (cudart, cublas, cublasLt, curand, nvrtc) with their
  # linker symlinks, headers, and the libcuda *stub* — everything needed to
  # compile and link candle's CUDA backend without a GPU present. cudarc
  # adds the stub dir to the link search path itself, so `-lcuda` resolves
  # against the stub. The resulting binary hard-links the CUDA runtime and
  # needs a matching NVIDIA driver on the host to run (see the release
  # notes); if CUDA is unavailable, use the CPU build above.
  # ---------------------------------------------------------------------
  build-linux-cuda:
    name: Linux x86_64 (CUDA)
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.6.2-devel-ubuntu22.04
    env:
      # No GPU on the runner, so candle-kernels cannot detect the compute
      # capability via nvidia-smi — set it explicitly (this was the build
      # failure). The kernels build to PTX, which is forward-compatible, so
      # this is the MINIMUM GPU generation: newer cards (Ada sm_89, Hopper
      # sm_90, ...) run it via driver JIT. Default sm_80 (Ampere: A100 / A10
      # / RTX 30xx) also keeps candle's bf16 kernels enabled (disabled below
      # sm_80). Override with a repo variable, e.g. 75 for T4/Turing (loses
      # bf16) or 90 to pin to Hopper.
      CUDA_COMPUTE_CAP: ${{ vars.CUDA_COMPUTE_CAP || '80' }}
    steps:
      # The CUDA image is a bare toolkit image (no host compiler, git, curl, or
      # openssl), so install the host-side build prerequisites first: nvcc needs
      # a C/C++ compiler, checkout needs git, rustup needs curl, and openssl-sys
      # (pulled by hf-hub's model downloader) needs libssl-dev + pkg-config.
      # ubuntu-latest ships these already, which is why only this container job
      # needs them. No `sudo` — the container runs as root.
      - name: Install build prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git \
            curl \
            ca-certificates \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Install protoc
        run: |
          apt-get update; \
          apt-get install -y unzip curl; \
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"; \
          unzip -o "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d "$HOME/.local"; \
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu-cuda

      - name: Build
        run: cargo build --release --locked -p apollo --features cuda

      - name: Package
        run: bash .github/scripts/package.sh x86_64-unknown-linux-gnu-cuda "${{ github.ref_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: apollo-x86_64-unknown-linux-gnu-cuda
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------
  # Publish: gather every platform's tarball, checksum them, and create
  # the GitHub release with all assets attached.
  # ---------------------------------------------------------------------
  release:
    name: Publish release
    needs: [build-macos-arm64, build-macos-intel, build-linux-cpu, build-linux-cuda]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            ## Binaries

            | Platform | Notes |
            |---|---|
            | `apollo-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz` | Apple Silicon, Metal-accelerated |
            | `apollo-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz` | Intel Mac, CPU |
            | `apollo-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz` | Linux x86_64, **CPU only — runs on any host, no GPU required.** Use this if you don't have an NVIDIA GPU. |
            | `apollo-${{ github.ref_name }}-x86_64-unknown-linux-gnu-cuda.tar.gz` | Linux x86_64, built with `--features cuda`. **Hard-links the CUDA runtime: requires an NVIDIA GPU and drivers/libraries compatible with CUDA 12.6 on the host, or it will not start.** Built for compute capability **sm_80 (Ampere) and up** — A100/A10/RTX 30xx and newer (Ada, Hopper) run via PTX JIT; older GPUs (e.g. Turing/T4 sm_75) are not covered. If CUDA isn't available, use the CPU build above. |

            Verify with `sha256sum -c SHA256SUMS.txt`.