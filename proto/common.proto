syntax = "proto3";

package apollo.v1;

// =============================================================================
// Shared messages and enums for the apollo.v1 services.
//
// This file defines no services; it is imported by both `inference.proto` (the
// `Inference` service the apollo server implements) and `webhook.proto` (the
// `Webhook` service a receiver implements). Keeping the messages here lets each
// service compile a self-contained FileDescriptorSet for reflection without the
// two services leaking into each other's schema.
// =============================================================================

// --------------------------------- requests ----------------------------------

message ClassifyRequest      { InputItem item = 1; }
message GetTaskRequest       { string task_id = 1; }
message CancelRequest        { string task_id = 1; }
message TaskCreated          { string task_id = 1; }
message Ack                  {}

// A content reference: a primary URL plus an optional fallback that is tried
// only if `main` cannot be fetched or decoded. Not a oneof — main and fallback
// coexist (a primary with a backup), rather than being mutually exclusive.
message Url {
  string main = 1;              // local path, file://, or http(s)://
  optional string fallback = 2; // tried only if `main` fails
}

// An input plus the models to run on it. Every label must be compatible with
// the chosen input modality.
message InputItem {
  repeated string models = 1;

  oneof input {
    Url    image_url = 2;   // fetched; supports a fallback
    Url    video_url = 3;   // fetched; supports a fallback
    string text      = 4;   // inline content (future); no URL, no fallback
    Url    audio_url = 5;   // fetched; supports a fallback (future)
  }

  // Run this input through a named [pipelines.<name>] instead of `models` as a
  // parallel set: the pipeline's steps run in order and may early-exit. At least
  // one of `models` or `pipeline` must be set.
  optional string pipeline = 6;
}

// ---------------------------------- results ----------------------------------

// A task carries a single input. Its `result` is exactly one of:
//   * error  — the task failed as a whole (e.g. the input could not be fetched);
//   * state  — a non-terminal (queued/processing) or cancelled task;
//   * models — the task finished and per-model results are available.
// The presence of `models` is itself the "completed" signal and the presence of
// `error` the "failed" signal, so those two states are implicit rather than enum
// values. Fields 2..99 are reserved — the previous layout put `state`/`items`
// there — so the result payload starts at 100, leaving room for future
// top-level fields.
message Task {
  string id = 1;

  reserved 2 to 99;

  oneof result {
    Error     error  = 100;  // task-level failure (implicit "failed")
    TaskState state  = 101;  // non-terminal or cancelled
    Models    models = 102;  // per-model results (implicit "completed")
  }
}

// Per-model results for a finished task, keyed by model label. One model failing
// does not sink the others — each carries its own `result`.
message Models {
  // The pipeline the input ran through, if any (else `models` was a flat set).
  optional string pipeline = 1;
  map<string, Model> models = 2;
}

// The outcome of running one model. Exactly one of:
//   * error          — the model failed (inference error, timeout, ...);
//   * state          — the model is still queued/processing, or was skipped;
//   * classification — image input result;
//   * frame_scan     — an image-classifier applied to a video (sampled frames).
// A set `classification`/`frame_scan` is the implicit "done" signal and a set
// `error` the implicit "failed" signal.
message Model {
  oneof result {
    Error          error          = 1;  // implicit "failed"
    ModelState     state          = 2;  // queued / processing / skipped
    Classification classification = 3;  // implicit "done" (image)
    FrameScan      frame_scan     = 4;  // implicit "done" (video scan)
  }
}

// A structured error. `kind` categorizes it for programmatic handling; `message`
// carries human-readable detail (and is always allowed). A purely ad-hoc error
// uses ERROR_TYPE_UNSPECIFIED with the text in `message`. (`kind`, not `type`, to
// avoid the Rust keyword.)
message Error {
  ErrorType kind = 1;
  string message = 2;
}

enum ErrorType {
  ERROR_TYPE_UNSPECIFIED = 0;        // uncategorized / custom (see message)
  ERROR_TYPE_FETCH = 1;              // the input could not be fetched
  ERROR_TYPE_DECODE = 2;             // fetched, but could not be decoded
  ERROR_TYPE_INFERENCE = 3;          // a model failed during inference
  ERROR_TYPE_TIMEOUT = 4;            // an operation exceeded its deadline
  ERROR_TYPE_CANCELLED = 5;          // the task was cancelled
  ERROR_TYPE_MODEL_UNAVAILABLE = 6;  // a model could not be loaded
  ERROR_TYPE_INTERNAL = 7;           // an unexpected server error
}

// A label set. Returned predictions are the top 5 unioned with any label
// scoring above 0.90.
message Classification {
  // Flat predictions. The `label` is a class index (vit) or a label-list index
  // (siglip flat); for a siglip taxonomy model it is the child-category id. The
  // per-parent grouping was dropped — reconstruct it from the taxonomy if needed.
  repeated Prediction predictions = 1;
}

// An image-classifier run frame-by-frame over a video.
message FrameScan {
  // Rolled up across classified frames via the strategy aggregation (max/mean).
  Classification aggregated = 1;
  // Only the frames actually classified (early exit truncates this list).
  repeated Frame frames = 2;
}

message Frame {
  double timestamp = 1;             // seconds into the video
  uint32 index     = 2;             // ordinal among sampled frames
  Classification classification = 3;
}

message Prediction {
  uint32 label = 1;
  float  score = 2;
}

// ----------------------------------- enums -----------------------------------
// proto3 enum values share the package namespace, so each set is prefixed.

// Non-terminal (and cancelled) task states. "Completed" and "failed" are not
// listed here: they are conveyed by Task.result being `models` or `error`.
enum TaskState {
  TASK_STATE_UNSPECIFIED = 0;
  TASK_STATE_QUEUED      = 1;
  TASK_STATE_PROCESSING  = 2;
  reserved 3, 4;  // was COMPLETED / FAILED — now implicit (see Task.result)
  reserved "TASK_STATE_COMPLETED", "TASK_STATE_FAILED";
  TASK_STATE_CANCELLED   = 5;   // cancelled by a client request
}

// Non-terminal (and skipped) model states. "Done" and "failed" are not listed:
// they are conveyed by Model.result being a result payload or `error`.
enum ModelState {
  MODEL_STATE_UNSPECIFIED = 0;
  MODEL_STATE_QUEUED      = 1;
  MODEL_STATE_PROCESSING  = 2;
  reserved 3, 4;  // was DONE / FAILED — now implicit (see Model.result)
  reserved "MODEL_STATE_DONE", "MODEL_STATE_FAILED";
  MODEL_STATE_SKIPPED     = 5;   // skipped by an earlier pipeline gate
}
