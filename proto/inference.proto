syntax = "proto3";

package apollo.v1;

import "common.proto";

// =============================================================================
// Inference service — implemented by the apollo server.
//
// Each input names its own models; the input's modality fixes which models are
// valid for it:
//   image -> any image-classifier
//   video -> any image-classifier with a video_strategy (sampled-frame scan)
//   text / audio -> models of that kind (future)
// Invalid model/modality combinations are rejected synchronously by Classify /
// ClassifyBatch before anything is queued. Runtime failures (unfetchable URL,
// inference error, timeout) are reported per item / per model instead.
// =============================================================================

service Inference {
  // Submit a single input. Returns immediately with a task id.
  rpc Classify (ClassifyRequest) returns (TaskCreated);

  // Submit several inputs as one batch under a single task id.
  rpc ClassifyBatch (ClassifyBatchRequest) returns (TaskCreated);

  // Poll task state and results. Backed by the database, so it survives restarts.
  rpc GetTask (GetTaskRequest) returns (Task);

  // Request cooperative cancellation of a task. Returns the task's state after
  // the request (CANCELLED unless it had already finished). In-flight items stop
  // at the next checkpoint (between models / between sampled video frames).
  rpc CancelTask (CancelRequest) returns (Task);
}
